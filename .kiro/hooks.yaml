hooks:
  # Warn if Mapbox token is hardcoded in source files
  - name: no-hardcoded-tokens
    on: pre-commit
    run: |
      if grep -r "pk\.eyJ1" frontend/src/ --include="*.js" --include="*.jsx"; then
        echo "ERROR: Mapbox token found hardcoded in source. Use import.meta.env.VITE_MAPBOX_TOKEN instead."
        exit 1
      fi

  # Ensure backend .env exists before running
  - name: check-backend-env
    on: pre-run
    run: |
      if [ ! -f backend/.env ]; then
        echo "WARNING: backend/.env not found. Copy backend/.env.example and add your MAPBOX_TOKEN."
      fi

  # Ensure frontend .env exists before running
  - name: check-frontend-env
    on: pre-run
    run: |
      if [ ! -f frontend/.env ]; then
        echo "WARNING: frontend/.env not found. Copy frontend/.env.example and add your VITE_MAPBOX_TOKEN."
      fi
